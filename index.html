<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SOS</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 24px; }
    button { font-size: 22px; padding: 14px 24px; }
    #status { margin-top: 16px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Bouton SOS</h1>
  <button id="sos">🚨 SOS</button>
  <div id="status"></div>

  <script>
    // 1) Mets l’URL de ton API Gateway (POST /sos)
    const API_URL = "https://4azegq2yw6.execute-api.eu-west-1.amazonaws.com/sos";

    // 2) POC : secret partagé (⚠️ visible dans le code JS)
    const SOS_SHARED_SECRET = "CHANGE_ME_TO_MATCH_LAMBDA_ENV";

    const status = document.getElementById("status");
    document.getElementById("sos").onclick = async () => {
      status.textContent = "Envoi en cours...";
      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-sos-secret": SOS_SHARED_SECRET
          },
          body: JSON.stringify({ source: "github-pages", ts: Date.now() })
        });

        const text = await res.text();
        if (!res.ok) throw new Error(`${res.status} ${text}`);
        status.textContent = "✅ SOS déclenché\n" + text;
      } catch (e) {
        status.textContent = "❌ Erreur\n" + (e?.message || e);
      }
    };
  </script>
</body>
</html>
